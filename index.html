<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FOCUS</title>
<meta name="description" content="Tap. React. Survive. A precision rhythm game.">
<meta name="theme-color" content="#0d0e1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FOCUS">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap');

:root{
  --bg:#0d0e1a;--ring-track:#1e2035;
  --accent:#c8c8ff;--accent2:#7b7fff;
  --text-primary:#e8e8ff;--text-mid:#5a5a7a;--text-dim:#2a2a3e;
  --miss:#ff2244;--good:#8899ff;--perfect:#ffffff;--po:.18;
}
[data-theme="yellow"]{--bg:#0a0a0a;--ring-track:#1a1a1a;--accent:#e8ff47;--accent2:#b8cc00;--text-primary:#f0f0f0;--text-mid:#666;--text-dim:#2a2a2a;--po:.14;}
[data-theme="neon"]{--bg:#04040e;--ring-track:#0d0d28;--accent:#00ffcc;--accent2:#00cc99;--text-primary:#d0fff8;--text-mid:#3a6a5a;--text-dim:#0d2020;--po:.16;}
[data-theme="crimson"]{--bg:#0e0707;--ring-track:#1e0e0e;--accent:#ff3355;--accent2:#cc1133;--text-primary:#ffe0e4;--text-mid:#6a2030;--text-dim:#2a0a10;--po:.16;}
[data-theme="white"]{--bg:#f0eeea;--ring-track:#d8d4cc;--accent:#111111;--accent2:#444444;--text-primary:#111111;--text-mid:#888880;--text-dim:#ccc8c0;--miss:#e03030;--good:#446688;--perfect:#000000;--po:.1;}
[data-theme="gold"]{--bg:#0a0800;--ring-track:#1a1400;--accent:#ffd700;--accent2:#cc9900;--text-primary:#fff8d0;--text-mid:#7a6a00;--text-dim:#2a2400;--po:.15;}
[data-theme="plasma"]{--bg:#050010;--ring-track:#110030;--accent:#cc44ff;--accent2:#8800cc;--text-primary:#f0d0ff;--text-mid:#5a2a7a;--text-dim:#1a0030;--po:.16;}
[data-theme="ice"]{--bg:#010d14;--ring-track:#051a2a;--accent:#60d0ff;--accent2:#2090cc;--text-primary:#d0f0ff;--text-mid:#306070;--text-dim:#051018;--po:.15;}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'IBM Plex Mono',monospace;background:var(--bg);color:var(--text-primary);
  display:flex;align-items:center;justify-content:center;user-select:none;transition:background .4s,color .4s;}

#bgCanvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;}

.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;z-index:1;}
.screen.active{opacity:1;pointer-events:all;}

/* HOME */
.title{font-size:clamp(2.4rem,10vw,4rem);font-weight:700;letter-spacing:.45em;margin-bottom:10px;}
.home-lives{display:flex;gap:6px;align-items:center;margin-bottom:40px;min-height:18px;}
.hdot{width:7px;height:7px;border-radius:50%;background:var(--accent);}
.hbtn{width:240px;height:52px;border-radius:0;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;
  letter-spacing:.5em;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-bottom:10px;
  transition:all .18s cubic-bezier(.2,.8,.3,1);border:none;position:relative;overflow:hidden;}
.hbtn.p{background:var(--accent);color:var(--bg);box-shadow:0 0 24px color-mix(in srgb,var(--accent) 45%,transparent);}
.hbtn.p:active{transform:scale(.97);filter:brightness(.9);}
.hbtn.s{background:color-mix(in srgb,var(--accent) 6%,transparent);border:1px solid color-mix(in srgb,var(--accent) 25%,transparent);color:var(--text-mid);backdrop-filter:blur(4px);}
.hbtn.s:active{background:color-mix(in srgb,var(--accent) 14%,transparent);color:var(--text-primary);transform:scale(.97);}
.cfg-btn{position:fixed;top:18px;left:18px;width:40px;height:40px;border-radius:50%;background:color-mix(in srgb,var(--accent) 12%,transparent);border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);color:var(--accent);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:50;backdrop-filter:blur(6px);transition:transform .3s ease,box-shadow .2s;}

/* SHARED SCROLLABLE SCREEN */
.scroll-screen{align-items:flex-start;padding:44px 32px 60px;justify-content:flex-start;overflow-y:auto;}
.sback{display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:36px;color:var(--text-mid);}
.sback-lbl{font-size:11px;font-weight:700;letter-spacing:.35em;color:var(--text-primary);}
.ssec{font-size:9px;letter-spacing:.3em;color:var(--text-dim);margin-bottom:12px;margin-top:4px;}
.sopts{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:24px;}
.chip{padding:10px 16px;border-radius:4px;border:1px solid var(--text-dim);cursor:pointer;
  font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.2em;
  color:var(--text-mid);background:transparent;transition:all .15s;display:flex;align-items:center;gap:8px;}
.chip.sel{border-color:var(--accent);color:var(--accent);background:color-mix(in srgb,var(--accent) 10%,transparent);}
.chip.diff{flex-direction:column;padding:12px 18px;align-items:center;}
.chip.locked{opacity:.3;cursor:not-allowed;pointer-events:none;}
.chip.locked-click{opacity:.35;cursor:pointer;}
.tdot{width:10px;height:10px;border-radius:50%;}
.chip.toggle{justify-content:space-between;width:100%;max-width:300px;}
.tog-track{width:28px;height:14px;border-radius:7px;background:var(--text-dim);position:relative;transition:background .2s;flex-shrink:0;}
.chip.sel .tog-track{background:var(--accent);}
.tog-knob{width:10px;height:10px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left .2s;}
.chip.sel .tog-knob{left:16px;}
.slider-row{display:flex;flex-direction:column;gap:6px;margin-bottom:24px;width:100%;max-width:300px;}
.slider-label-row{display:flex;justify-content:space-between;}
.slider-lbl{font-size:9px;letter-spacing:.25em;color:var(--text-mid);}
.slider-val{font-size:9px;letter-spacing:.15em;color:var(--accent);font-weight:700;}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:2px;border-radius:2px;
  background:linear-gradient(to right,var(--accent) 0%,var(--accent) var(--pct,30%),var(--text-dim) var(--pct,30%));
  outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;
  border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--bg);box-shadow:0 0 0 1px var(--accent);}

/* GAME */
#game{position:relative;cursor:pointer;width:100%;height:100%;}
.g-top{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;
  padding:28px 28px 0;z-index:2;pointer-events:none;}
.mode-lbl{font-size:10px;font-weight:600;letter-spacing:.25em;color:var(--text-mid);}
.lives-num{font-size:clamp(1.8rem,7vw,2.8rem);font-weight:700;color:var(--text-mid);transition:color .3s;}
.lives-num.danger{color:var(--miss);animation:numPulse .65s ease infinite;}
@keyframes numPulse{0%,100%{opacity:1}50%{opacity:.4}}
.score-area{position:absolute;top:80px;width:100%;text-align:center;z-index:2;pointer-events:none;}
.score-num{font-size:clamp(2.8rem,10vw,4.5rem);font-weight:700;letter-spacing:.02em;display:inline-block;}
.score-label{font-size:9px;letter-spacing:.4em;color:var(--text-mid);margin-top:2px;}
.ring-area{position:relative;z-index:1;width:min(300px,78vw);height:min(300px,78vw);}
.ring-svg{width:100%;height:100%;overflow:visible;}
.combo-area{position:absolute;bottom:96px;width:100%;text-align:center;z-index:2;pointer-events:none;}
.combo-val{font-size:clamp(1.8rem,7vw,3rem);font-weight:700;color:var(--text-mid);transition:color .2s;display:inline-block;}
.combo-val.lit{color:var(--text-primary);}
.combo-sub{font-size:9px;letter-spacing:.4em;color:var(--text-mid);margin-top:2px;}
.tap-lbl{position:absolute;bottom:-44px;left:50%;transform:translateX(-50%);
  font-size:11px;font-weight:700;letter-spacing:.3em;opacity:0;white-space:nowrap;transition:opacity .08s;z-index:3;}
.spd-wrap{position:absolute;bottom:52px;left:50%;transform:translateX(-50%);width:min(180px,50vw);z-index:2;pointer-events:none;}
.spd-bar-bg{height:2px;background:var(--text-dim);border-radius:2px;}
.spd-bar{height:100%;background:var(--accent);border-radius:2px;transition:width .3s,background .3s;width:4%;}
.spd-lbl{font-size:8px;letter-spacing:.2em;color:var(--text-dim);text-align:center;margin-top:5px;}
.quit-btn{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.4em;
  color:var(--text-mid);background:color-mix(in srgb,var(--miss) 10%,transparent);border:1px solid color-mix(in srgb,var(--miss) 35%,transparent);
  border-radius:0;cursor:pointer;z-index:3;pointer-events:all;padding:12px 32px;font-weight:700;
  overflow:hidden;transition:color .2s,border-color .2s,box-shadow .2s;}
.quit-btn::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,34,68,.18),transparent);transition:left .35s ease;}
.quit-btn:hover{color:var(--miss);border-color:var(--miss);box-shadow:0 0 16px color-mix(in srgb,var(--miss) 30%,transparent);transform:scale(1.04);}
.quit-btn:hover::after{left:100%;}
.quit-btn:active{transform:scale(.97);filter:brightness(.85);}

#flash{position:fixed;inset:0;pointer-events:none;opacity:0;z-index:10;transition:opacity .05s;}
#vignette{position:fixed;inset:0;pointer-events:none;z-index:9;opacity:0;transition:opacity .6s;
  background:radial-gradient(ellipse at center,transparent 30%,color-mix(in srgb,var(--miss) 70%,transparent) 100%);}
#shatter{position:fixed;inset:0;pointer-events:none;z-index:11;display:none;}
.shard{position:absolute;border-radius:2px;background:var(--accent);}
#cd{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:var(--bg);z-index:20;font-size:clamp(5rem,20vw,8rem);font-weight:700;
  color:var(--accent);opacity:0;pointer-events:none;transition:opacity .15s;}
#cd.show{opacity:1;pointer-events:all;}

/* RESULT */
#result{align-items:flex-start;padding:40px 32px 80px;justify-content:flex-start;overflow-y:auto;overflow-x:hidden;}
.rl{font-size:9px;letter-spacing:.35em;color:var(--text-dim);margin-bottom:4px;}
.rs{font-size:clamp(3rem,12vw,5.5rem);font-weight:700;letter-spacing:.02em;line-height:1;}
.rstats{display:grid;grid-template-columns:1fr 1fr;gap:18px 32px;margin-bottom:28px;width:100%;max-width:320px;}
.sv{font-size:1.5rem;font-weight:700;}
.sk{font-size:9px;letter-spacing:.25em;color:var(--text-dim);margin-top:2px;}
.rbtns{display:flex;gap:10px;margin-top:4px;}
.rbtn{padding:14px 24px;border-radius:4px;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;
  letter-spacing:.4em;cursor:pointer;transition:all .15s;border:none;}
.rbtn.p{background:var(--accent);color:var(--bg);}
.rbtn.p:active{filter:brightness(.85);}
.rbtn.s{background:transparent;border:1px solid var(--text-dim);color:var(--text-mid);}
.new-best-row{display:flex;align-items:baseline;gap:10px;margin-bottom:24px;flex-wrap:wrap;}
.new-best-badge{display:inline-block;font-size:8px;letter-spacing:.2em;color:var(--bg);
  background:var(--accent);padding:3px 8px;border-radius:2px;font-weight:700;vertical-align:middle;}
.unlock-toast{margin-bottom:14px;padding:12px 14px;border:1px solid var(--accent);border-radius:4px;
  background:color-mix(in srgb,var(--accent) 8%,transparent);}
.unlock-toast-title{font-size:8px;letter-spacing:.3em;color:var(--accent);margin-bottom:4px;}
.unlock-toast-name{font-size:11px;font-weight:700;letter-spacing:.15em;}
.unlock-toast-reward{font-size:9px;letter-spacing:.12em;color:var(--text-mid);margin-top:4px;}
#rUnlocks{margin-bottom:16px;}

/* STATS */
.stat-tabs{display:flex;gap:0;margin-bottom:20px;border:1px solid var(--text-dim);border-radius:4px;overflow:hidden;width:100%;max-width:300px;}
.stat-tab{flex:1;padding:10px 0;text-align:center;font-size:9px;font-weight:700;letter-spacing:.2em;cursor:pointer;
  color:var(--text-mid);background:transparent;border:none;font-family:'IBM Plex Mono',monospace;transition:all .15s;}
.stat-tab.active{background:var(--accent);color:var(--bg);}
.stat-panel{display:none;}
.stat-panel.active{display:block;}
.stat-hero{margin-bottom:24px;padding:16px 0 14px;border-bottom:1px solid var(--text-dim);}
.stat-hero-label{font-size:9px;letter-spacing:.35em;color:var(--text-dim);margin-bottom:6px;}
.stat-hero-val{font-size:clamp(2.8rem,10vw,4.2rem);font-weight:700;color:var(--accent);line-height:1;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 28px;margin-bottom:24px;}
.stat-cell-val{font-size:1.4rem;font-weight:700;}
.stat-cell-key{font-size:8px;letter-spacing:.28em;color:var(--text-dim);margin-top:2px;}
.stat-run{display:flex;justify-content:space-between;align-items:center;
  padding:9px 0;border-bottom:1px solid var(--text-dim);}
.stat-run-score{font-size:10px;font-weight:700;letter-spacing:.05em;}
.stat-run-meta{font-size:9px;color:var(--text-mid);letter-spacing:.1em;text-align:right;}
.stat-run.is-best .stat-run-score{color:var(--accent);}

/* UNLOCKS */
.unlock-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
.unlock-card{padding:14px 16px;border-radius:4px;border:1px solid var(--text-dim);transition:all .2s;}
.unlock-card.earned{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 6%,transparent);}
.unlock-card.locked-card{opacity:.55;}
.uc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
.uc-name{font-size:10px;font-weight:700;letter-spacing:.2em;}
.uc-badge{font-size:7px;letter-spacing:.25em;padding:2px 7px;border-radius:2px;font-weight:700;}
.earned .uc-badge{background:var(--accent);color:var(--bg);}
.locked-card .uc-badge{background:var(--text-dim);color:var(--bg);}
.uc-desc{font-size:9px;letter-spacing:.12em;color:var(--text-mid);line-height:1.5;}
.uc-reward{font-size:8px;letter-spacing:.15em;color:var(--accent);margin-top:6px;opacity:.8;}
.locked-card .uc-reward{color:var(--text-mid);}
.uc-prog{margin-top:8px;height:2px;background:var(--text-dim);border-radius:2px;}
.uc-prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s;}

/* lock hint toast */
.lock-hint{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
  background:var(--bg);border:1px solid var(--accent);border-radius:4px;padding:10px 18px;
  font-size:9px;letter-spacing:.2em;color:var(--accent);z-index:50;
  opacity:0;pointer-events:none;transition:opacity .2s;white-space:nowrap;}
.lock-hint.show{opacity:1;}

/* DAILY STREAK */
.streak-row{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
.streak-fire{font-size:1.3rem;line-height:1;}
.streak-info{display:flex;flex-direction:column;}
.streak-count{font-size:1.1rem;font-weight:700;letter-spacing:.05em;color:var(--accent);line-height:1;}
.streak-label{font-size:8px;letter-spacing:.3em;color:var(--text-mid);margin-top:2px;}
.streak-dots{display:flex;gap:5px;align-items:center;margin-bottom:28px;}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--text-dim);transition:background .3s,transform .2s;}
.sdot.done{background:var(--accent);}
.sdot.today{background:var(--accent);transform:scale(1.35);box-shadow:0 0 6px var(--accent);}
.sdot-lbl{font-size:7px;letter-spacing:.15em;color:var(--text-dim);margin-left:4px;}

/* XP / RANK */
.xp-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.rank-badge{font-size:8px;font-weight:700;letter-spacing:.2em;padding:3px 9px;border-radius:2px;background:var(--accent);color:var(--bg);flex-shrink:0;}
.xp-bar-wrap{flex:1;height:4px;background:var(--text-dim);border-radius:4px;overflow:hidden;}
.xp-bar-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .6s cubic-bezier(.2,.8,.3,1);}
.xp-label{font-size:8px;letter-spacing:.18em;color:var(--text-mid);margin-top:3px;}
.xp-gained{font-size:9px;letter-spacing:.15em;color:var(--accent);font-weight:700;}

/* ANIM */
@keyframes rIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.rIn{animation:rIn .3s ease forwards;}
@keyframes shake{0%{transform:translate(0)}12%{transform:translate(-10px,4px)}25%{transform:translate(9px,-5px)}
  40%{transform:translate(-8px,3px)}58%{transform:translate(6px,-3px)}74%{transform:translate(-4px,2px)}
  88%{transform:translate(2px,-1px)}100%{transform:translate(0)}}
@keyframes nudge{0%{transform:translate(0)}35%{transform:translate(3px,-2px)}70%{transform:translate(-2px,1px)}100%{transform:translate(0)}}
@keyframes scorePop{0%{transform:scale(1)}40%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes comboPop{0%{transform:scale(1)}40%{transform:scale(1.15)}100%{transform:scale(1)}}
.shake{animation:shake .44s ease;}
.nudge{animation:nudge .22s ease;}
.sPop{animation:scorePop .18s ease;}
.cPop{animation:comboPop .18s ease;}

/* NAME MODAL */
#nameModal{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:40px 32px;opacity:0;pointer-events:none;transition:opacity .4s;}
#nameModal.show{opacity:1;pointer-events:all;}
.nm-logo{font-size:clamp(2.8rem,14vw,5rem);font-weight:700;letter-spacing:.4em;margin-bottom:6px;
  background:linear-gradient(135deg,var(--text-primary) 40%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.nm-tagline{font-size:8px;letter-spacing:.45em;color:var(--text-dim);margin-bottom:48px;}
.nm-title{font-size:11px;font-weight:700;letter-spacing:.35em;margin-bottom:8px;color:var(--text-primary);}
.nm-sub{font-size:9px;letter-spacing:.2em;color:var(--text-mid);margin-bottom:28px;text-align:center;line-height:1.9;}
.nm-input-wrap{position:relative;width:100%;max-width:300px;margin-bottom:32px;}
.nm-input{width:100%;background:transparent;border:none;border-bottom:2px solid var(--text-dim);
  padding:12px 4px;font-family:'IBM Plex Mono',monospace;font-size:1.3rem;font-weight:700;letter-spacing:.12em;
  color:var(--text-primary);outline:none;text-align:center;caret-color:var(--accent);transition:border-color .2s;box-sizing:border-box;}
.nm-input:focus{border-bottom-color:var(--accent);}
.nm-input::placeholder{color:var(--text-dim);font-size:.9rem;letter-spacing:.15em;}
.nm-char-count{position:absolute;right:4px;bottom:-18px;font-size:8px;letter-spacing:.15em;color:var(--text-dim);}
.nm-btn{width:220px;height:52px;border-radius:4px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;
  letter-spacing:.5em;cursor:pointer;background:var(--accent);color:var(--bg);border:none;transition:all .15s;margin-bottom:16px;}
.nm-btn:active{filter:brightness(.85);transform:scale(.97);}
.nm-btn:disabled{opacity:.4;cursor:default;}
.nm-skip{font-size:8px;letter-spacing:.25em;color:var(--text-dim);cursor:pointer;background:none;border:none;
  font-family:'IBM Plex Mono',monospace;padding:8px;text-decoration:underline;text-underline-offset:3px;}

/* ADMIN PANEL */
#admin{align-items:flex-start;padding:44px 24px 60px;justify-content:flex-start;overflow-y:auto;}
.adm-wrap{width:100%;max-width:480px;}
.adm-hero{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;flex-wrap:wrap;gap:10px;}
.adm-title{font-size:clamp(1.2rem,5vw,1.8rem);font-weight:700;letter-spacing:.3em;}
.adm-sub{font-size:8px;letter-spacing:.2em;color:var(--text-mid);margin-top:4px;}
.adm-stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px;}
.adm-stat{padding:14px 12px;border:1px solid var(--text-dim);border-radius:4px;}
.adm-stat-val{font-size:1.4rem;font-weight:700;color:var(--accent);}
.adm-stat-key{font-size:8px;letter-spacing:.2em;color:var(--text-dim);margin-top:3px;}
.adm-table-head{display:grid;grid-template-columns:1fr 52px
